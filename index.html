<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oscilloscope Audio Visualizer</title>
    <style>
        @import url('https://cdn.jsdelivr.net/npm/@fontsource/inter@5/index.css');
        @import url('https://cdn.jsdelivr.net/npm/@fontsource/jetbrains-mono@5/index.css');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app {
            width: 100%;
            height: 100%;
            max-width: 960px;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @media (min-height: 700px) {
            .app {
                max-height: 700px;
                border: 1px solid #1a1a2a;
                border-radius: 16px;
                background: #0d0d14;
            }
        }

        @media (min-width: 1000px) {
            .app {
                border-radius: 16px;
                border: 1px solid #1a1a2a;
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            flex-shrink: 0;
            border-bottom: 1px solid #1a1a2a;
        }

        .header h1 {
            font-size: 1.15rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }

        .file-info {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: #444;
            text-align: right;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-info.loaded {
            color: #00ff88;
        }

        .controls {
            padding: 12px 20px;
            flex-shrink: 0;
            border-bottom: 1px solid #1a1a2a;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-play {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #000;
            padding: 8px 20px;
            font-size: 0.8rem;
            box-shadow: 0 2px 12px rgba(0,255,136,0.2);
        }

        .btn-play:hover:not(:disabled) {
            box-shadow: 0 2px 20px rgba(0,255,136,0.35);
        }

        .btn-play:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-stop {
            background: #2a2a3a;
            color: #ccc;
            padding: 8px 14px;
            font-size: 0.8rem;
        }

        .btn-stop:hover:not(:disabled) { background: #3a3a4a; }
        .btn-stop:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-file {
            background: #1a1a2a;
            color: #888;
            padding: 8px 14px;
            font-size: 0.75rem;
            border: 1px solid #2a2a3a;
        }

        .btn-file:hover {
            border-color: #00ff88;
            color: #00ff88;
        }

        .btn-mode {
            background: #1a1a2a;
            color: #666;
            padding: 7px 12px;
            font-size: 0.65rem;
            border: 1px solid #2a2a3a;
            margin-left: auto;
        }

        .btn-mode:hover { border-color: #00ff88; color: #00ff88; }

        .time-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #00ff88;
            background: #0a0a12;
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #1a1a2a;
            min-width: 110px;
            text-align: center;
        }

        .progress-container {
            margin-bottom: 10px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: #1a1a2a;
            border-radius: 2px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00ccff);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .settings-row {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .setting-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .setting-label {
            font-size: 0.6rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .setting-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 70px;
            height: 3px;
            background: #2a2a3a;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .setting-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 11px;
            height: 11px;
            background: #00ff88;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 6px rgba(0,255,136,0.3);
        }

        .setting-slider::-moz-range-thumb {
            width: 11px;
            height: 11px;
            background: #00ff88;
            border-radius: 50%;
            cursor: pointer;
            border: none;
            box-shadow: 0 0 6px rgba(0,255,136,0.3);
        }

        .color-options {
            display: flex;
            gap: 4px;
        }

        .color-btn {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .color-btn:hover { transform: scale(1.25); }

        .color-btn.active {
            border-color: #fff;
            box-shadow: 0 0 6px currentColor;
        }

        .color-green { background: #00ff88; }
        .color-cyan { background: #00ccff; }
        .color-orange { background: #ff8800; }
        .color-pink { background: #ff4488; }
        .color-white { background: #ffffff; }

        #audioInput { display: none; }

        .canvas-container {
            flex: 1;
            min-height: 0;
            padding: 12px 20px 16px 20px;
            display: flex;
            flex-direction: column;
        }

        .scope-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 4px 8px 4px;
        }

        .scope-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .scope-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #333;
            transition: all 0.3s ease;
        }

        .status-dot.active {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .status-text {
            color: #444;
        }

        .status-text.active {
            color: #00ff88;
        }

        .canvas-wrapper {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            background: #050508;
            border: 1px solid #1a1a2a;
            flex: 1;
            min-height: 0;
        }

        #oscilloscopeCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .canvas-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.35) 100%);
        }

        .scanline {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
        }

        .mode-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            color: #333;
            text-align: center;
            padding: 4px 0 0 0;
        }

        @media (max-width: 500px) {
            .app {
                border: none;
                border-radius: 0;
            }
            .header { padding: 10px 12px; }
            .header h1 { font-size: 0.95rem; }
            .controls { padding: 10px 12px; }
            .canvas-container { padding: 10px 12px 12px 12px; }
            .settings-row { gap: 10px; }
            .setting-slider { width: 50px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <h1>Oscilloscope Audio Visualizer</h1>
            <div class="file-info" id="fileInfo">No file loaded</div>
        </div>

        <div class="controls">
            <div class="controls-row">
                <button class="btn btn-play" id="playBtn" disabled>
                    <span id="playIcon">▶</span>
                    <span id="playLabel">Play</span>
                </button>
                <button class="btn btn-stop" id="stopBtn" disabled>⏹ Stop</button>
                <button class="btn btn-file" id="fileBtn">📂 Load File</button>
                <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
                <button class="btn btn-mode" id="modeBtn">Mode: Lissajous</button>
            </div>
            <div class="progress-container">
                <div class="progress-bar-bg" id="progressBar">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
            </div>
            <div class="settings-row">
                <div class="setting-group">
                    <span class="setting-label">Vol</span>
                    <input type="range" class="setting-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.8">
                </div>
                <div class="setting-group">
                    <span class="setting-label">Scale</span>
                    <input type="range" class="setting-slider" id="scaleSlider" min="1" max="5" step="0.1" value="2">
                </div>
                <div class="setting-group">
                    <span class="setting-label">Thick</span>
                    <input type="range" class="setting-slider" id="thicknessSlider" min="0.5" max="5" step="0.5" value="2">
                </div>
                <div class="setting-group">
                    <span class="setting-label">Persist</span>
                    <input type="range" class="setting-slider" id="persistenceSlider" min="0.03" max="0.5" step="0.01" value="0.12">
                </div>
                <div class="setting-group">
                    <span class="setting-label">Color</span>
                    <div class="color-options">
                        <div class="color-btn color-green active" data-color="#00ff88"></div>
                        <div class="color-btn color-cyan" data-color="#00ccff"></div>
                        <div class="color-btn color-orange" data-color="#ff8800"></div>
                        <div class="color-btn color-pink" data-color="#ff4488"></div>
                        <div class="color-btn color-white" data-color="#ffffff"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="canvas-container">
            <div class="scope-header">
                <div class="scope-title">Visualizer</div>
                <div class="scope-status">
                    <div class="status-dot" id="statusDot"></div>
                    <span class="status-text" id="statusText">Idle</span>
                </div>
            </div>
            <div class="canvas-wrapper">
                <canvas id="oscilloscopeCanvas"></canvas>
                <div class="canvas-overlay"></div>
                <div class="scanline"></div>
            </div>
            <div class="mode-label" id="modeLabel">X-Y: Lissajous Figure (Stereo)</div>
        </div>
    </div>

    <input type="file" id="audioInput" accept="audio/*">

    <script>
        const fileInfo = document.getElementById('fileInfo');
        const canvas = document.getElementById('oscilloscopeCanvas');
        const ctx = canvas.getContext('2d');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const fileBtn = document.getElementById('fileBtn');
        const audioInput = document.getElementById('audioInput');
        const playIcon = document.getElementById('playIcon');
        const playLabel = document.getElementById('playLabel');
        const timeDisplay = document.getElementById('timeDisplay');
        const modeBtn = document.getElementById('modeBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const volumeSlider = document.getElementById('volumeSlider');
        const scaleSlider = document.getElementById('scaleSlider');
        const thicknessSlider = document.getElementById('thicknessSlider');
        const persistenceSlider = document.getElementById('persistenceSlider');
        const modeLabel = document.getElementById('modeLabel');
        const colorBtns = document.querySelectorAll('.color-btn');

        let audioContext = null;
        let analyserL = null;
        let analyserR = null;
        let sourceNode = null;
        let gainNode = null;
        let splitterNode = null;
        let audioBuffer = null;
        let isPlaying = false;
        let startTime = 0;
        let pauseOffset = 0;
        let animationId = null;
        let displayMode = 0;
        const modes = ['Lissajous', 'Scope', 'Spectrum'];
        const modeLabels = [
            'X-Y: Lissajous Figure (Stereo L→X, R→Y)',
            'CH1: Audio Signal (Waveform)',
            'FFT: Spectral Analysis'
        ];
        let waveformColor = '#00ff88';

        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            const rect = wrapper.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        fileBtn.addEventListener('click', () => audioInput.click());

        audioInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFile(e.target.files[0]);
        });

        async function handleFile(file) {
            fileInfo.textContent = file.name;
            fileInfo.classList.add('loaded');

            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }

            try {
                const arrayBuffer = await file.arrayBuffer();
                audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                playBtn.disabled = false;
                stopBtn.disabled = false;
                pauseOffset = 0;
                updateTimeDisplay(0);
                progressFill.style.width = '0%';
            } catch (err) {
                console.error('Audio decode error:', err);
                fileInfo.textContent = 'Error: unsupported format';
                fileInfo.classList.remove('loaded');
            }
        }

        playBtn.addEventListener('click', () => {
            if (!audioBuffer) return;
            if (isPlaying) pausePlayback();
            else startPlayback();
        });

        stopBtn.addEventListener('click', stopPlayback);

        function startPlayback() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') audioContext.resume();

            analyserL = audioContext.createAnalyser();
            analyserL.fftSize = 4096;
            analyserL.smoothingTimeConstant = 0.75;

            analyserR = audioContext.createAnalyser();
            analyserR.fftSize = 4096;
            analyserR.smoothingTimeConstant = 0.75;

            gainNode = audioContext.createGain();
            gainNode.gain.value = volumeSlider.value;

            splitterNode = audioContext.createChannelSplitter(2);

            sourceNode = audioContext.createBufferSource();
            sourceNode.buffer = audioBuffer;

            sourceNode.connect(splitterNode);
            splitterNode.connect(analyserL, 0);
            splitterNode.connect(analyserR, 1);

            const merger = audioContext.createChannelMerger(2);
            analyserL.connect(merger, 0, 0);
            analyserR.connect(merger, 0, 1);
            merger.connect(gainNode);
            gainNode.connect(audioContext.destination);

            sourceNode.onended = () => { if (isPlaying) stopPlayback(); };

            sourceNode.start(0, pauseOffset);
            startTime = audioContext.currentTime - pauseOffset;
            isPlaying = true;

            playIcon.textContent = '⏸';
            playLabel.textContent = 'Pause';
            statusDot.classList.add('active');
            statusText.classList.add('active');
            statusText.textContent = 'Playing';

            const rect = canvas.parentElement.getBoundingClientRect();
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, rect.width, rect.height);

            drawVisualization();
            updateProgress();
        }

        function pausePlayback() {
            if (sourceNode) {
                pauseOffset = audioContext.currentTime - startTime;
                sourceNode.onended = null;
                sourceNode.stop();
                sourceNode = null;
            }
            isPlaying = false;
            playIcon.textContent = '▶';
            playLabel.textContent = 'Play';
            statusDot.classList.remove('active');
            statusText.classList.remove('active');
            statusText.textContent = 'Paused';
            if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
        }

        function stopPlayback() {
            if (sourceNode) {
                sourceNode.onended = null;
                sourceNode.stop();
                sourceNode = null;
            }
            isPlaying = false;
            pauseOffset = 0;
            playIcon.textContent = '▶';
            playLabel.textContent = 'Play';
            statusDot.classList.remove('active');
            statusText.classList.remove('active');
            statusText.textContent = 'Stopped';
            progressFill.style.width = '0%';
            updateTimeDisplay(0);
            if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
            drawIdleScreen();
        }

        modeBtn.addEventListener('click', () => {
            displayMode = (displayMode + 1) % modes.length;
            modeBtn.textContent = 'Mode: ' + modes[displayMode];
            modeLabel.textContent = modeLabels[displayMode];
        });

        volumeSlider.addEventListener('input', (e) => {
            if (gainNode) gainNode.gain.value = parseFloat(e.target.value);
        });

        progressBar.addEventListener('click', (e) => {
            if (!audioBuffer) return;
            const rect = progressBar.getBoundingClientRect();
            const ratio = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            const seekTime = ratio * audioBuffer.duration;
            const wasPlaying = isPlaying;
            if (isPlaying) pausePlayback();
            pauseOffset = seekTime;
            progressFill.style.width = (ratio * 100) + '%';
            updateTimeDisplay(seekTime);
            if (wasPlaying) startPlayback();
        });

        function updateProgress() {
            if (!isPlaying || !audioBuffer) return;
            const elapsed = audioContext.currentTime - startTime;
            const duration = audioBuffer.duration;
            const ratio = Math.min(elapsed / duration, 1);
            progressFill.style.width = (ratio * 100) + '%';
            updateTimeDisplay(elapsed);
            if (ratio < 1) requestAnimationFrame(updateProgress);
        }

        function updateTimeDisplay(elapsed) {
            const duration = audioBuffer ? audioBuffer.duration : 0;
            timeDisplay.textContent = formatTime(elapsed) + ' / ' + formatTime(duration);
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return '00:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }

        colorBtns.forEach((btn) => {
            btn.addEventListener('click', () => {
                colorBtns.forEach((b) => b.classList.remove('active'));
                btn.classList.add('active');
                waveformColor = btn.dataset.color;
            });
        });

        function drawGrid(w, h) {
            const gridSize = 40;
            ctx.strokeStyle = '#111122';
            ctx.lineWidth = 0.5;
            for (let gx = 0; gx <= w; gx += gridSize) {
                ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, h); ctx.stroke();
            }
            for (let gy = 0; gy <= h; gy += gridSize) {
                ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(w, gy); ctx.stroke();
            }
        }

        function drawIdleScreen() {
            const rect = canvas.parentElement.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, w, h);
            drawGrid(w, h);

            ctx.strokeStyle = waveformColor + '33';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0, h / 2); ctx.lineTo(w, h / 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(w / 2, 0); ctx.lineTo(w / 2, h); ctx.stroke();

            ctx.fillStyle = waveformColor + '55';
            ctx.font = '12px "JetBrains Mono", monospace';
            ctx.textAlign = 'center';
            ctx.fillText('Load an audio file to begin', w / 2, h / 2);
        }

        drawIdleScreen();

        let idleFrame = 0;

        function drawIdleAnimation() {
            if (isPlaying) { requestAnimationFrame(drawIdleAnimation); return; }

            const rect = canvas.parentElement.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;

            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, w, h);
            drawGrid(w, h);

            idleFrame++;
            const centerY = h / 2;
            const sc = parseFloat(scaleSlider.value);

            if (audioBuffer) {
                ctx.shadowColor = waveformColor;
                ctx.shadowBlur = 8;
                ctx.strokeStyle = waveformColor + '55';
                ctx.lineWidth = parseFloat(thicknessSlider.value);
                ctx.beginPath();
                for (let px = 0; px < w; px++) {
                    const t = px / w;
                    const yVal = centerY - (Math.sin(t * 6 + idleFrame * 0.03) * 20 * sc
                        + Math.sin(t * 12 + idleFrame * 0.05) * 8 * sc) * Math.sin(t * Math.PI);
                    if (px === 0) ctx.moveTo(px, yVal);
                    else ctx.lineTo(px, yVal);
                }
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            requestAnimationFrame(drawIdleAnimation);
        }

        drawIdleAnimation();

        function drawPhosphorFade(w, h) {
            const persistence = parseFloat(persistenceSlider.value);
            ctx.fillStyle = `rgba(5, 5, 8, ${persistence})`;
            ctx.fillRect(0, 0, w, h);

            ctx.save();
            ctx.globalAlpha = 0.08;
            drawGrid(w, h);
            ctx.restore();
        }

        function drawVisualization() {
            if (!isPlaying || !analyserL || !analyserR) return;

            const rect = canvas.parentElement.getBoundingClientRect();
            const w = rect.width;
            const h = rect.height;

            drawPhosphorFade(w, h);

            if (displayMode === 0) drawLissajous(w, h);
            else if (displayMode === 1) drawOscilloscope(w, h);
            else drawSpectrum(w, h);

            animationId = requestAnimationFrame(drawVisualization);
        }

        function drawOscilloscope(w, h) {
            const bufLen = analyserL.fftSize;
            const data = new Uint8Array(bufLen);
            analyserL.getByteTimeDomainData(data);

            const sc = parseFloat(scaleSlider.value);
            const thick = parseFloat(thicknessSlider.value);
            const centerY = h / 2;

            ctx.shadowColor = waveformColor;
            ctx.shadowBlur = 12;
            ctx.strokeStyle = waveformColor;
            ctx.lineWidth = thick;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.beginPath();

            const sliceW = w / bufLen;
            for (let idx = 0; idx < bufLen; idx++) {
                const v = data[idx] / 128.0;
                const yPos = centerY - (v - 1) * (h / 2) * sc;
                if (idx === 0) ctx.moveTo(idx * sliceW, yPos);
                else ctx.lineTo(idx * sliceW, yPos);
            }
            ctx.stroke();

            ctx.shadowBlur = 0;
            ctx.strokeStyle = waveformColor + '33';
            ctx.lineWidth = thick + 3;
            ctx.beginPath();
            for (let idx = 0; idx < bufLen; idx++) {
                const v = data[idx] / 128.0;
                const yPos = centerY - (v - 1) * (h / 2) * sc;
                if (idx === 0) ctx.moveTo(idx * sliceW, yPos);
                else ctx.lineTo(idx * sliceW, yPos);
            }
            ctx.stroke();

            ctx.fillStyle = waveformColor + '77';
            ctx.font = '10px "JetBrains Mono", monospace';
            ctx.textAlign = 'left';
            ctx.fillText('CH1', 6, 14);
            ctx.textAlign = 'right';
            ctx.fillText('TIME', w - 6, h - 6);
        }

        function drawSpectrum(w, h) {
            const bufLen = analyserL.frequencyBinCount;
            const data = new Uint8Array(bufLen);
            analyserL.getByteFrequencyData(data);

            const sc = parseFloat(scaleSlider.value);
            const barCount = Math.min(bufLen, 256);
            const barW = w / barCount;

            ctx.shadowColor = waveformColor;
            ctx.shadowBlur = 8;

            for (let idx = 0; idx < barCount; idx++) {
                const barH = (data[idx] / 255) * h * 0.8 * sc;
                const xVal = idx * barW;

                const grad = ctx.createLinearGradient(0, h, 0, h - barH);
                grad.addColorStop(0, waveformColor + '15');
                grad.addColorStop(0.6, waveformColor + 'aa');
                grad.addColorStop(1, waveformColor);

                ctx.fillStyle = grad;
                ctx.fillRect(xVal, h - barH, barW - 1, barH);

                ctx.fillStyle = waveformColor + '10';
                ctx.fillRect(xVal, h, barW - 1, barH * 0.2);
            }

            ctx.shadowBlur = 0;
            ctx.fillStyle = waveformColor + '77';
            ctx.font = '10px "JetBrains Mono", monospace';
            ctx.textAlign = 'left';
            ctx.fillText('FFT', 6, 14);
            ctx.textAlign = 'right';
            ctx.fillText('20Hz–20kHz', w - 6, 14);
        }

        function drawLissajous(w, h) {
            const bufLen = analyserL.fftSize;
            const dataL = new Uint8Array(bufLen);
            const dataR = new Uint8Array(bufLen);

            analyserL.getByteTimeDomainData(dataL);
            analyserR.getByteTimeDomainData(dataR);

            const sc = parseFloat(scaleSlider.value);
            const thick = parseFloat(thicknessSlider.value);
            const cx = w / 2;
            const cy = h / 2;
            const radius = Math.min(w, h) * 0.4 * sc;

            ctx.shadowColor = waveformColor;
            ctx.shadowBlur = 12;
            ctx.strokeStyle = waveformColor;
            ctx.lineWidth = thick;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            ctx.beginPath();
            for (let idx = 0; idx < bufLen; idx++) {
                const xVal = (dataL[idx] - 128) / 128.0;
                const yVal = (dataR[idx] - 128) / 128.0;
                const px = cx + xVal * radius;
                const py = cy - yVal * radius;
                if (idx === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();

            ctx.shadowBlur = 0;
            ctx.strokeStyle = waveformColor + '44';
            ctx.lineWidth = thick + 5;
            ctx.beginPath();
            for (let idx = 0; idx < bufLen; idx++) {
                const xVal = (dataL[idx] - 128) / 128.0;
                const yVal = (dataR[idx] - 128) / 128.0;
                const px = cx + xVal * radius;
                const py = cy - yVal * radius;
                if (idx === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();

            ctx.fillStyle = waveformColor + '77';
            ctx.font = '10px "JetBrains Mono", monospace';
            ctx.textAlign = 'left';
            ctx.fillText('X-Y', 6, 14);
            ctx.textAlign = 'right';
            ctx.fillText('L→X  R→Y', w - 6, 14);
        }
    </script>
